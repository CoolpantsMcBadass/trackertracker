<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TrackerTracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <header>
    <div class="tt-logo-row">
      <img src="../icons/icon48.png" class="tt-logo" alt="" />
      <span class="tt-appname">TrackerTracker</span>
    </div>
    <div class="tt-header-right">
      <span id="tt-site-host" class="tt-site-host"></span>
      <button id="tt-gear-btn" class="tt-gear-btn" title="Settings">
        <svg viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M4.1 4.1l1.4 1.4M14.5 14.5l1.4 1.4M4.1 15.9l1.4-1.4M14.5 5.5l1.4-1.4"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="tt-search-row">
    <svg class="tt-search-icon" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.5"/>
      <path d="M10 10l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="tt-search" class="tt-search-input" placeholder="Filter trackers…" />
  </div>

  <main id="tt-main">

    <!-- ── This Page tab ── -->
    <div id="tt-tab-page" class="tt-tab-content">

      <div id="tt-banner-chip" class="tt-banner-chip hidden"></div>

      <div class="tt-summary">
        <span id="tt-count" class="tt-count">0</span>
        <span class="tt-count-label">trackers on this page</span>
      </div>

      <div id="tt-tracker-list" class="tt-tracker-list">
        <div id="tt-empty" class="tt-empty">No trackers detected yet.</div>
      </div>

    </div>

    <!-- ── Settings tab ── -->
    <div id="tt-tab-settings" class="tt-tab-content hidden">

      <div class="tt-settings-group">

        <div class="tt-settings-label">This site</div>

        <div class="tt-setting-row">
          <div class="tt-setting-text">
            <span class="tt-setting-name">Enabled</span>
            <span class="tt-setting-sub" id="tt-setting-host"></span>
          </div>
          <label class="tt-toggle">
            <input type="checkbox" id="tt-site-toggle" checked />
            <span class="tt-track"><span class="tt-thumb"></span></span>
          </label>
        </div>

      </div>

      <div class="tt-settings-divider"></div>

      <div class="tt-settings-group">

        <div class="tt-settings-label">Blocking</div>

        <div class="tt-setting-row">
          <div class="tt-setting-text">
            <span class="tt-setting-name">Block all trackers</span>
            <span class="tt-setting-sub">Blocks all trackers except support</span>
          </div>
          <label class="tt-toggle">
            <input type="checkbox" id="tt-block-all" />
            <span class="tt-track"><span class="tt-thumb"></span></span>
          </label>
        </div>

        <div class="tt-setting-row">
          <div class="tt-setting-text">
            <span class="tt-setting-name">Block by default</span>
            <span class="tt-setting-sub">Always on across sessions</span>
          </div>
          <label class="tt-toggle">
            <input type="checkbox" id="tt-block-default" />
            <span class="tt-track"><span class="tt-thumb"></span></span>
          </label>
        </div>

      </div>

      <div class="tt-settings-divider"></div>

      <div class="tt-settings-group">

        <div class="tt-settings-label">Appearance</div>

        <div class="tt-setting-row">
          <div class="tt-setting-text">
            <span class="tt-setting-name">Light mode</span>
            <span class="tt-setting-sub">Switch to light theme</span>
          </div>
          <label class="tt-toggle">
            <input type="checkbox" id="tt-light-mode" />
            <span class="tt-track"><span class="tt-thumb"></span></span>
          </label>
        </div>

      </div>

      <div class="tt-settings-divider"></div>

      <div class="tt-settings-footer">
        <a href="https://github.com/CoolpantsMcBadass/trackertracker" target="_blank" rel="noopener">
          Open source - view on GitHub ↗
        </a>
      </div>

    </div>

  </main>

  <script src="popup.js"></script>
</body>
</html>
